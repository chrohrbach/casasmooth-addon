# casasmooth Add-on
# Runs from a pre-built Docker image (ghcr.io/chrohrbach/casasmooth-{arch}).
# Default: source code is compiled to .pyc bytecode, runs from /opt/casasmooth.
# When ``dev_mount`` is enabled, /opt/casasmooth/app is swapped for a symlink
# to /config/casasmooth/app so developers can edit Python sources over SSH and
# restart the addon for an instant reload. See docs/operations/deployment.md.

name: "casasmooth"
version: "2.0.31"
slug: casasmooth
description: "casasmooth Smart Home System"
url: "https://github.com/chrohrbach/casasmooth-addon"

arch:
  - amd64
  - aarch64

image: "ghcr.io/chrohrbach/casasmooth-{arch}"

init: false
startup: application
boot: auto

map:
  - config:rw
  - ssl:ro
  - media:rw
  - share:rw

ports:
  28100/tcp: 28100
  8003/tcp: 8003
ports_description:
  28100/tcp: "casasmooth API Server"
  8003/tcp: "casasmooth MCP Server"

ingress: true
ingress_port: 28100
ingress_stream: false

panel_icon: "mdi:home-automation"
panel_title: "casasmooth"
webui: "http://[HOST]:[PORT:28100]/docs"

environment:
  CASASMOOTH_MODE: "production"
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: "/opt/casasmooth"
  CS_APP_DATA: "/opt/casasmooth/app/data"

options:
  api_port: 28100
  log_level: "info"
  dev_mount: false

schema:
  api_port: int
  log_level: list(debug|info|warning|error)
  dev_mount: bool

hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true

watchdog: "http://[HOST]:[PORT:28100]/health"
