# casasmooth Production Add-on
# Runs from a pre-built Docker image (ghcr.io/chrohrbach/casasmooth-{arch})
# Source code is compiled to .pyc bytecode for protection

name: "casasmooth"
version: "2.0.2"
slug: casasmooth
description: "casasmooth Smart Home System"
url: "https://github.com/chrohrbach/casasmooth-addon"

# Architecture support
arch:
  - amd64
  - aarch64

# Pre-built image (pulled from GitHub Container Registry, not built locally)
# {arch} is replaced by HA with the machine's architecture
image: "ghcr.io/chrohrbach/casasmooth-{arch}"

# Container settings
init: false
startup: application
boot: auto

# Mount /config read-write so the addon can:
# - Write generated YAML to /config/casasmooth/locals/prod/
# - Copy Lovelace cards to /config/www/community/resources/
# - Copy custom components to /config/custom_components/
# - Sync API keys to /config/secrets.yaml
# - Write configuration.yaml includes
# Mount media read-write for camera snapshots
map:
  - config:rw
  - ssl:ro
  - media:rw
  - share:rw

# Network - expose API + MCP ports
ports:
  28100/tcp: 28100
  8003/tcp: 8003
ports_description:
  28100/tcp: "casasmooth API Server"
  8003/tcp: "casasmooth MCP Server"

# Ingress (access through HA UI)
ingress: true
ingress_port: 28100
ingress_stream: false

# Panel integration
panel_icon: "mdi:home-automation"
panel_title: "casasmooth"

# Environment
environment:
  CASASMOOTH_MODE: "production"
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: "/opt/casasmooth"
  CS_APP_DATA: "/config/casasmooth/data"

# User-configurable options
options:
  api_port: 28100
  log_level: "info"

schema:
  api_port: int
  log_level: list(debug|info|warning|error)

# Permissions
hassio_api: true
homeassistant_api: true
auth_api: true

# Watchdog - auto-restart if API becomes unresponsive
watchdog: "http://[HOST]:[PORT:28100]/health"
